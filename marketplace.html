<!DOCTYPE html>
<html>

<head>

<title>Broker Marketplace</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Deal Marketplace</h1>

<div class="grid" id="dealBoard"></div>

<script>

let deals = [

{
industry:"Restaurant",
revenue:95000,
credit:620,
amount:45000,
score:78,
status:"Available"
},

{
industry:"Retail",
revenue:120000,
credit:650,
amount:60000,
score:85,
status:"Available"
},

{
industry:"Construction",
revenue:80000,
credit:600,
amount:40000,
score:70,
status:"Available"
},

{
industry:"Trucking",
revenue:70000,
credit:590,
amount:35000,
score:64,
status:"Available"
}

]

function loadDeals(){

let board = document.getElementById("dealBoard")

board.innerHTML=""

deals.forEach(d=>{

board.innerHTML+=`

<div class="card">

<b>${d.industry}</b><br><br>

Revenue: $${d.revenue}/mo<br>
Credit: ${d.credit}<br>
Needs: $${d.amount}<br>
Score: ${d.score}<br>
Status: ${d.status}<br>

<button onclick="requestDeal()">Request Deal</button>

</div>

`

})

}

function requestDeal(){

alert("Deal request sent!")

}

loadDeals()

</script>

</body>

</html>
