<!DOCTYPE html>
<html>

<head>

<title>BrokerOS Marketplace</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Inter, Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav a{
margin:0 10px;
color:#94a3b8;
text-decoration:none;
font-weight:600;
}

nav a:hover{
color:white;
}

.container{
padding:30px;
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
}

.panel{
background:#020617;
padding:20px;
border-radius:12px;
border:1px solid #1e293b;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #1e293b;
}

th{
color:#64748b;
font-size:12px;
text-transform:uppercase;
}

tr:hover{
background:#020617;
cursor:pointer;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:700;
}

.score{
background:#0369a1;
}

.available{
background:#22c55e;
}

.requested{
background:#f59e0b;
}

.funded{
background:#10b981;
}

button{
background:linear-gradient(90deg,#22c55e,#16a34a);
border:none;
padding:10px 15px;
border-radius:8px;
font-weight:700;
cursor:pointer;
color:white;
}

button:hover{
opacity:.9;
}

.activity{
display:flex;
flex-direction:column;
gap:10px;
}

.activity-item{
background:#0f172a;
padding:10px;
border-radius:8px;
font-size:14px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.stat{
background:#0f172a;
padding:12px;
border-radius:8px;
text-align:center;
}

.stat-number{
font-size:20px;
font-weight:800;
}

</style>

</head>

<body>

<header>

<div class="logo">BrokerOS</div>

<nav>
<a href="index.html">Home</a>
<a href="marketplace.html">Marketplace</a>
<a href="analyzer.html">Deal Lab</a>
<a href="funders.html">Funders</a>
<a href="leaderboard.html">Leaderboard</a>
</nav>

<button onclick="postDeal()">Post Deal</button>

</header>

<div class="container">

<div class="panel">

<h2>Marketplace Deals</h2>

<table>

<thead>

<tr>

<th>Industry</th>
<th>Revenue</th>
<th>Credit</th>
<th>Amount</th>
<th>Score</th>
<th>Status</th>

</tr>

</thead>

<tbody id="dealTable"></tbody>

</table>

</div>

<div>

<div class="panel">

<h3>Market Stats</h3>

<div class="stats">

<div class="stat">
<div class="stat-number" id="activeDeals">0</div>
Active Deals
</div>

<div class="stat">
<div class="stat-number" id="fundedDeals">0</div>
Funded
</div>

</div>

</div>

<div class="panel">

<h3>Activity Feed</h3>

<div class="activity" id="activity"></div>

</div>

</div>

</div>

<script>

let deals = JSON.parse(localStorage.getItem("brokerDeals")||"[]")

if(deals.length==0){

deals=[

{industry:"Restaurant",revenue:95000,credit:620,amount:45000,score:78,status:"available"},

{industry:"Retail",revenue:120000,credit:650,amount:60000,score:85,status:"available"},

{industry:"Construction",revenue:80000,credit:600,amount:40000,score:70,status:"requested"},

{industry:"Trucking",revenue:70000,credit:590,amount:35000,score:64,status:"available"}

]

}

function save(){

localStorage.setItem("brokerDeals",JSON.stringify(deals))

}

function render(){

let table=document.getElementById("dealTable")

table.innerHTML=""

let funded=0

deals.forEach((d,i)=>{

if(d.status=="funded")funded++

table.innerHTML+=`

<tr onclick="openDeal(${i})">

<td>${d.industry}</td>

<td>$${d.revenue.toLocaleString()}</td>

<td>${d.credit}</td>

<td>$${d.amount.toLocaleString()}</td>

<td><span class="badge score">${d.score}</span></td>

<td><span class="badge ${d.status}">${d.status}</span></td>

</tr>

`

})

document.getElementById("activeDeals").innerText=deals.length
document.getElementById("fundedDeals").innerText=funded

}

function postDeal(){

let industry=prompt("Industry")
let revenue=parseInt(prompt("Monthly Revenue"))
let credit=parseInt(prompt("Credit Score"))
let amount=parseInt(prompt("Funding Requested"))

let score=Math.floor(Math.random()*30)+60

deals.unshift({industry,revenue,credit,amount,score,status:"available"})

save()

render()

addActivity("New deal posted")

}

function openDeal(i){

let action=prompt("Type REQUEST, FUND, or CANCEL")

if(action=="REQUEST"){

deals[i].status="requested"

addActivity("Deal requested")

}

if(action=="FUND"){

deals[i].status="funded"

addActivity("Deal funded")

}

save()

render()

}

function addActivity(text){

let box=document.getElementById("activity")

let div=document.createElement("div")

div.className="activity-item"

div.innerText=text

box.prepend(div)

}

render()

</script>

</body>

</html>
