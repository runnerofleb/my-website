<!DOCTYPE html>
<html>
<head>

<title>Broker Deal Analyzer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
width:450px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:10px;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:none;
}

button{
padding:12px 22px;
background:#22c55e;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.results{
margin-top:25px;
text-align:left;
background:#020617;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>SuperBroker Deal Analyzer</h1>

<div class="container">

<select id="industry">
<option value="restaurant">Restaurant</option>
<option value="retail">Retail</option>
<option value="construction">Construction</option>
<option value="trucking">Trucking</option>
</select>

<input id="credit" placeholder="Credit Score">

<input id="revenue" placeholder="Monthly Revenue">

<input id="months" placeholder="Months In Business">

<input id="positions" placeholder="Existing Positions">

<input id="amount" placeholder="Funding Requested">

<button onclick="analyze()">Analyze Deal</button>

<div class="results" id="results"></div>

</div>

<script>

function analyze(){

let credit = parseInt(document.getElementById("credit").value)
let revenue = parseInt(document.getElementById("revenue").value)
let months = parseInt(document.getElementById("months").value)
let positions = parseInt(document.getElementById("positions").value)
let amount = parseInt(document.getElementById("amount").value)

let score = 50
let flags = []

// credit scoring
if(credit >= 680) score += 25
else if(credit >= 620) score += 15
else if(credit >= 580) score += 5
else{
score -= 15
flags.push("Low credit profile")
}

// revenue strength
if(revenue >= 100000) score += 20
else if(revenue >= 50000) score += 10
else{
score -= 10
flags.push("Low revenue level")
}

// time in business
if(months >= 24) score += 15
else if(months >= 12) score += 8
else{
score -= 10
flags.push("Short time in business")
}

// stacking risk
if(positions == 0) score += 10
else if(positions == 1) score += 3
else{
score -= 20
flags.push("High stack risk")
}

// funding capacity
let maxFunding = Math.round(revenue * 0.6)

// payment estimate
let factor = 1.42
let totalPayback = Math.round(amount * factor)
let dailyPayment = Math.round(totalPayback / 120)

// grade
let grade

if(score >= 85) grade = "A"
else if(score >= 70) grade = "B"
else if(score >= 55) grade = "C"
else grade = "D"

document.getElementById("results").innerHTML =

`
<h3>Deal Score: ${score}/100</h3>

Risk Grade: ${grade}

<br><br>

Estimated Max Funding: $${maxFunding}

<br>

Daily Payment Estimate: $${dailyPayment}

<br>

Total Payback: $${totalPayback}

<br><br>

<b>Risk Flags</b><br>
${flags.join("<br>")}

<br><br>

<b>Best Funder Matches</b><br>

Credibly<br>
Everest Business Funding<br>
Fundkite<br>
Forward Financing

`

}

</script>

</body>

</html>
