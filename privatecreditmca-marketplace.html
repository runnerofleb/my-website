*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;font-feature-settings:'cv02','cv03','cv04','cv11'}

nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(5,10,18,.7);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:-.3px}
.logo .mk{width:26px;height:26px;border-radius:7px;background:var(--ac);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 0 16px rgba(99,91,255,.3)}

.logo .mk svg{width:13px;height:13px}
.logo .dim{color:var(--tx3);font-weight:500}
.nc{display:flex;gap:28px}.nc a{font-size:13px;font-weight:500;color:var(--tx3);transition:color .25s;letter-spacing:.1px}.nc a:hover,.nc a.on{color:var(--tx)}
.nr{display:flex;gap:10px}.nb{padding:7px 18px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .25s;letter-spacing:.1px}.nb.p{background:var(--ac);color:#fff;box-shadow:0 0 16px rgba(99,91,255,.2)}.nb.p:hover{background:var(--acd);box-shadow:0 0 24px rgba(99,91,255,.3)}.nb.s{background:transparent;color:var(--tx2);border:1px solid var(--bdr2)}.nb.s:hover{border-color:var(--bdr3)}

.fi2{animation:fu .5s ease both}

/* ═══ LAYOUT ═══ */
.app{display:flex;padding-top:60px;min-height:100vh}

/* ═══ SIDEBAR ═══ */
.side{width:var(--sw);min-width:var(--sw);border-right:1px solid var(--bdr);padding:24px 20px;position:fixed;top:60px;bottom:0;left:0;overflow-y:auto;background:var(--bg2)}
.side::-webkit-scrollbar{width:4px}.side::-webkit-scrollbar-thumb{background:var(--bdr3);border-radius:4px}
.ss{margin-bottom:24px}.sl{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:10px}
.si{width:100%;padding:10px 14px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);font-family:inherit;font-size:12px;outline:none;transition:border-color .2s}.si::placeholder{color:var(--tx3)}.si:focus{border-color:rgba(99,91,255,.3);box-shadow:0 0 12px rgba(99,91,255,.06)}
.cg{display:flex;flex-wrap:wrap;gap:5px}.ch{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--bdr);background:transparent;color:var(--tx3);cursor:pointer;font-family:inherit;transition:all .2s}.ch:hover{border-color:var(--bdr2);color:var(--tx2)}.ch.on{border-color:rgba(99,91,255,.3);color:var(--ac);background:var(--acl)}
.sr input[type=range]{width:100%;-webkit-appearance:none;background:transparent;margin:8px 0}.sr input[type=range]::-webkit-slider-track{height:3px;border-radius:2px;background:var(--bdr2)}.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ac);margin-top:-5px;cursor:pointer;box-shadow:0 0 10px rgba(99,91,255,.3)}
.srl{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-top:4px}.srl .v{color:var(--ac);font-weight:600}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}.sb{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:14px;text-align:center}.sb .n{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--em));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sb .l{font-size:9px;color:var(--tx3);margin-top:2px;letter-spacing:.3px}

/* ═══ MAIN ═══ */
.main{flex:1;margin-left:var(--sw);padding:24px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.mh h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:12px;letter-spacing:-.5px}
.lb{display:inline-flex;align-items:center;gap:6px;background:var(--rdl);border:1px solid rgba(248,113,113,.1);padding:3px 10px;border-radius:6px;font-size:9px;font-weight:600;color:var(--rd);text-transform:uppercase;letter-spacing:1.5px}.lb .bk{width:5px;height:5px;border-radius:50%;background:var(--rd);box-shadow:0 0 6px rgba(248,113,113,.4);animation:pulse 1.2s infinite}

/* ═══ DEAL CARDS ═══ */

.dc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;cursor:pointer;transition:all .4s;position:relative;overflow:hidden}
.dc:hover{border-color:var(--bdr2);transform:translateY(-4px);box-shadow:var(--shl),0 0 40px rgba(99,91,255,.03)}

.dt{display:flex;justify-content:space-between;margin-bottom:10px}
.ds{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.ds.live{color:var(--rd)}.ds.live .dot{width:4px;height:4px;border-radius:50%;background:var(--rd);box-shadow:0 0 4px rgba(248,113,113,.4);animation:pulse 1.2s infinite}

.dbz{font-size:16px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
.dts{display:flex;gap:5px;margin-bottom:10px}
.tg{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}

.rs{display:inline-flex;align-items:center;justify-content:center;width:28px;height:18px;border-radius:4px;font-size:10px;font-weight:700}
.rs.a{background:var(--gnl);color:var(--gn)}.rs.b{background:var(--acl);color:var(--ac)}.rs.c{background:var(--aml);color:var(--am)}
.rt{flex:1;height:3px;border-radius:2px;background:var(--bdr)}.rf{height:100%;border-radius:2px}.rf.h{background:var(--gn)}.rf.m{background:var(--am)}.rf.lo{background:var(--rd)}
.df{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}

.mst{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--rd);margin-bottom:10px}

.ot{width:100%;border-collapse:collapse}

.tll{position:relative;padding-left:24px}.tll::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:1px;background:var(--bdr2)}

.ac2{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;animation:si .4s ease both;margin-bottom:6px;box-shadow:var(--sh)}
@keyframes si{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.ac2 .at{font-size:12px;color:var(--tx2);line-height:1.4}.ac2 .at strong{color:var(--tx)}
.ac2 .atm{font-size:10px;color:var(--tx3);margin-top:3px}

@media(max-width:1100px){.ap{display:none}}
@media(max-width:900px){.side{display:none}.main{margin-left:0}.mfg,.mai-g{grid-template-columns:1fr 1fr}.nc{display:none}}

</style>
