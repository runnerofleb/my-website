let fl={i:'all',s:'all',r:'all'};
function tf(b,t){b.parentElement.querySelectorAll('.ch').forEach(c=>c.classList.remove('on'));b.classList.add('on');fl[t]=b.dataset.v;fD()}
function uR(){document.getElementById('rV').textContent='$'+document.getElementById('aR').value+'K';fD()}
function fm(n){return n>=1000?'$'+(n/1000).toFixed(0)+'K':'$'+n}

function fD(){
  const q=document.getElementById('sI').value.toLowerCase(),mx=parseInt(document.getElementById('aR').value)*1000,so=document.getElementById('sS').value;
  let r=D.filter(d=>{
    if(fl.i!=='all'&&d.ind!==fl.i)return false;if(fl.s!=='all'&&d.status!==fl.s)return false;if(fl.r!=='all'&&d.rg!==fl.r)return false;
    if(d.req>mx)return false;if(q&&!d.biz.toLowerCase().includes(q)&&!d.ind.toLowerCase().includes(q)&&!d.st.toLowerCase().includes(q))return false;return true;
  });
  if(so==='amount-high')r.sort((a,b)=>b.req-a.req);else if(so==='amount-low')r.sort((a,b)=>a.req-b.req);else if(so==='offers')r.sort((a,b)=>b.offers.length-a.offers.length);else if(so==='risk')r.sort((a,b)=>b.rs-a.rs);
  rD(r);
}

function rD(list){
  document.getElementById('dC').textContent=list.length;
  document.getElementById('dG').innerHTML=list.map((d,i)=>{
    const rc=d.rg==='A'?'a':d.rg==='B'?'b':'c',bc=d.rs>=75?'h':d.rs>=60?'m':'lo',sl=d.status[0].toUpperCase()+d.status.slice(1);
    return `<div class="dc fi" style="animation-delay:${i*.04}s" onclick="oD(${d.id})">
      <div class="dt"><div class="ds ${d.status}">${d.status==='live'?'<span class="dot"></span>':''}${sl}</div><div class="dtm mono">${d.time}</div></div>
      <div class="dbz">${d.biz}</div><div class="dts"><span class="tg i">${d.ind}</span><span class="tg s">${d.st}</span></div>
      <div class="rr"><span class="rs ${rc}">${d.rg}</span><div class="rt"><div class="rf ${bc}" style="width:${d.rs}%"></div></div><span class="mono" style="font-size:11px;color:var(--tx3)">${d.rs}</span></div>
      <div class="df"><div class="dfi"><div class="fl">Requested</div><div class="fv">${fm(d.req)}</div></div><div class="dfi"><div class="fl">Monthly Rev</div><div class="fv ac">${fm(d.rev)}/mo</div></div></div>
      <div class="dbot"><div class="doc"><span class="cn">${d.offers.length}</span>${d.offers.length===1?'offer':'offers'}</div><button class="dvb">View Deal →</button></div>
    </div>`;
  }).join('');
}

function oD(id){
  const d=D.find(x=>x.id===id);if(!d)return;
  const oH=d.offers.length>0?`<div class="mof"><div class="mof-h"><h3>Competing Offers <span class="ocb">${d.offers.length}</span></h3></div>
    <table class="ot"><thead><tr><th>Funder</th><th>Amount</th><th>Factor</th><th>Cost</th><th>Status</th><th></th></tr></thead><tbody>
    ${d.offers.map(o=>`<tr><td class="ofn">${o.f}</td><td class="oam mono">${fm(o.a)}</td><td class="mono" style="color:var(--tx2)">${o.fc.toFixed(2)}</td><td class="mono" style="color:var(--tx3)">${fm(Math.round(o.a*o.fc))}</td><td><span class="obg ${o.s==='active'?'ac':'rv'}">${o.s[0].toUpperCase()+o.s.slice(1)}</span></td><td>${o.s==='active'?'<button class="oac" onclick="aO(event)">Accept</button>':''}</td></tr>`).join('')}
    </tbody></table></div>`:`<div class="mof" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">⏳</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Waiting for Offers</div><div style="font-size:14px;color:var(--tx3)">Funders are reviewing. Offers typically appear within 4 hours.</div></div>`;

  document.getElementById('mB').innerHTML=`
    <div class="mh2"><div class="mst ${d.status}">${d.status==='live'?'<span class="dot"></span>':''}${d.status.toUpperCase()} · ${d.time}</div>
    <div class="mbz">${d.biz}</div><div class="mts"><span class="tg i">${d.ind}</span><span class="tg s">${d.st}</span><span class="rs ${d.rg==='A'?'a':'b'}" style="font-size:12px">${d.rg} · ${d.rs}</span></div>
    <div class="mfg"><div class="mf"><div class="l">Requested</div><div class="v">${fm(d.req)}</div></div><div class="mf"><div class="l">Monthly Rev</div><div class="v ac">${fm(d.rev)}</div></div><div class="mf"><div class="l">Offers</div><div class="v">${d.offers.length}</div></div><div class="mf"><div class="l">Best Factor</div><div class="v ac">${d.offers.length>0?Math.min(...d.offers.filter(o=>o.s==='active').map(o=>o.fc)).toFixed(2):'—'}</div></div></div></div>
    <div class="mai"><div class="mai-l">🧠 AI BankIQ Analysis</div><div class="mai-g"><div class="mai-i"><div class="al">Monthly Revenue</div><div class="av">${d.ai.rev}</div></div><div class="mai-i"><div class="al">NSF Count</div><div class="av ${d.ai.nsf<=2?'g':'w'}">${d.ai.nsf}</div></div><div class="mai-i"><div class="al">Risk Score</div><div class="av g">${d.ai.rs}</div></div><div class="mai-i"><div class="al">Approval Range</div><div class="av">${d.ai.ar}</div></div></div></div>
    ${oH}
    <div class="mtl"><h3>Deal Timeline</h3><div class="tll">${d.tl.map(t=>`<div class="tli"><div class="tt mono">${t.t}</div><div class="te">${t.e}</div></div>`).join('')}</div></div>`;
  document.getElementById('mO').classList.add('open');document.body.style.overflow='hidden';
}
function cM(e){if(e.target===document.getElementById('mO'))cMF()}
function cMF(){document.getElementById('mO').classList.remove('open');document.body.style.overflow=''}
function aO(e){e.stopPropagation();const b=e.target;b.textContent='Accepted ✓';b.style.pointerEvents='none';b.closest('tr').style.background='var(--gn-l)'}

const msgs=[{t:'<strong>Apex Funding</strong> submitted an offer on <strong>QuickFix Auto</strong>'},{t:'New deal: <strong>Bright Smile Dental</strong> — $75K'},{t:'<strong>Forward Financing</strong> reviewing <strong>Golden Dragon</strong>'},{t:'<strong>Credibly</strong> submitted offer on <strong>Metro Logistics</strong>'},{t:'Deal <strong>funded</strong>: TechServe IT — $120K @ 1.28'},{t:'<strong>National Funding</strong> offer on <strong>AllStar Retail</strong>'},{t:'<strong>Rapid Finance</strong> offer on <strong>Peak Roofing</strong>'}];
let ai=0;
function sA(){const c=document.getElementById('aP'),m=msgs[ai++%msgs.length],d=document.createElement('div');d.className='ac';d.innerHTML=`<div class="ah"><span class="bk"></span>Activity</div><div class="at">${m.t}</div><div class="atm mono">Just now</div>`;c.prepend(d);while(c.children.length>3)c.lastChild.remove();const s=document.getElementById('sd');s.textContent=parseInt(s.textContent)+(Math.random()>.5?1:0)}
setTimeout(()=>sA(),3000);setInterval(()=>sA(),8000);
rD(D);
</script>
</body>
</html>
