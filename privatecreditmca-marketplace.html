<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivateCreditMCA — Live Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080A;
  --bg-card: #0D0F13;
  --bg-card-hover: #12151B;
  --bg-surface: #10131A;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --border-focus: rgba(0,232,123,0.4);
  --text: #EAEDF3;
  --text-dim: #6B7280;
  --text-mid: #9CA3AF;
  --accent: #00E87B;
  --accent-dim: rgba(0,232,123,0.10);
  --accent-glow: rgba(0,232,123,0.25);
  --red: #FF4D4D;
  --red-dim: rgba(255,77,77,0.10);
  --amber: #FFAA2C;
  --amber-dim: rgba(255,170,44,0.10);
  --blue: #3B82F6;
  --blue-dim: rgba(59,130,246,0.10);
  --purple: #A855F7;
  --purple-dim: rgba(168,85,247,0.10);
  --radius: 14px;
  --radius-sm: 8px;
  --sidebar-w: 280px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}
.mono { font-family: 'JetBrains Mono', monospace; }

body::before {
  content: '';
  position: fixed; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}

/* ─── TOP NAV ─────────────────────────── */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 60px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(7,8,10,0.85); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.topnav-logo {
  font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 10px;
  text-decoration: none; color: var(--text);
}
.topnav-logo .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.8)}
}
.topnav-center {
  display: flex; align-items: center; gap: 28px;
}
.topnav-center a {
  font-size: 13px; font-weight: 500; color: var(--text-dim);
  text-decoration: none; padding: 6px 0;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.topnav-center a.active,
.topnav-center a:hover { color: var(--text); border-color: var(--accent); }
.topnav-right { display: flex; align-items: center; gap: 16px; }
.topnav-btn {
  background: var(--accent); color: var(--bg); border: none;
  padding: 8px 20px; border-radius: 100px; font-weight: 700;
  font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.topnav-btn:hover { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }
.topnav-btn.secondary {
  background: transparent; color: var(--text-mid);
  border: 1px solid var(--border-bright);
}
.topnav-btn.secondary:hover { border-color: var(--text-mid); color: var(--text); }

/* ─── LAYOUT ──────────────────────────── */
.app { display: flex; padding-top: 60px; min-height: 100vh; }

/* ─── LEFT SIDEBAR ────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  position: fixed; top: 60px; bottom: 0; left: 0;
  overflow-y: auto;
  background: var(--bg);
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

.sidebar-section { margin-bottom: 28px; }
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;
}
.filter-search {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 13px;
  outline: none; transition: border 0.2s;
}
.filter-search::placeholder { color: var(--text-dim); }
.filter-search:focus { border-color: var(--border-focus); }

.filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-chip {
  padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.filter-chip:hover { border-color: var(--border-bright); color: var(--text-mid); }
.filter-chip.active {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-dim);
}

.filter-range { margin-top: 8px; }
.filter-range input[type="range"] {
  width: 100%; -webkit-appearance: none; background: transparent; margin: 8px 0;
}
.filter-range input[type="range"]::-webkit-slider-track {
  height: 4px; border-radius: 2px; background: var(--border-bright);
}
.filter-range input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); margin-top: -6px; cursor: pointer;
  box-shadow: 0 0 8px var(--accent-glow);
}
.filter-range-label {
  display: flex; justify-content: space-between; font-size: 12px;
  color: var(--text-dim); margin-top: 4px;
}
.filter-range-label .val { color: var(--accent); font-weight: 600; }

.sidebar-stat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.sidebar-stat {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px; text-align: center;
}
.sidebar-stat .num {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), #00C9FF);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-stat .lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

/* ─── MAIN CONTENT ────────────────────── */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  padding: 24px;
}

/* ─── TOP BAR ─────────────────────────── */
.marketplace-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.marketplace-header h1 {
  font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 12px;
}
.marketplace-header h1 .live-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--red-dim); border: 1px solid rgba(255,77,77,0.2);
  padding: 4px 12px; border-radius: 100px;
  font-size: 11px; font-weight: 700; color: var(--red);
  text-transform: uppercase; letter-spacing: 1.5px;
}
.live-badge .blink {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: pulse 1s infinite;
}
.view-toggle { display: flex; gap: 4px; }
.view-btn {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.view-btn.active, .view-btn:hover {
  border-color: var(--border-bright); color: var(--text); background: var(--bg-card);
}

/* ─── SORT / COUNT BAR ────────────────── */
.sort-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; font-size: 13px;
}
.sort-bar .count { color: var(--text-dim); }
.sort-bar .count strong { color: var(--text-mid); }
.sort-select {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-mid); padding: 6px 12px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 12px; cursor: pointer; outline: none;
}

/* ─── DEAL GRID ───────────────────────── */
.deal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ─── DEAL CARD ───────────────────────── */
.deal-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative; overflow: hidden;
}
.deal-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.deal-card:hover {
  border-color: var(--border-bright); transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
.deal-card:hover::before { opacity: 1; }

.deal-card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
.deal-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px;
}
.deal-status.live { color: var(--red); }
.deal-status.live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1s infinite; }
.deal-status.new { color: var(--blue); }
.deal-status.funded { color: var(--accent); }
.deal-status.reviewing { color: var(--amber); }
.deal-time { font-size: 11px; color: var(--text-dim); }

.deal-biz { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.deal-meta-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 14px;
}
.deal-tag {
  display: inline-flex; padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  color: var(--text-dim);
}
.deal-tag.industry { border-color: rgba(59,130,246,0.2); color: var(--blue); background: var(--blue-dim); }
.deal-tag.state { border-color: rgba(168,85,247,0.2); color: var(--purple); background: var(--purple-dim); }

.deal-financials {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.deal-fin-block {
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.deal-fin-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.deal-fin-val { font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: -0.3px; }
.deal-fin-val.accent { color: var(--accent); }

.deal-offers-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 14px; border-top: 1px solid var(--border);
}
.deal-offer-count {
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.deal-offer-count .cnt {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent-dim); color: var(--accent);
  font-size: 12px; font-weight: 700;
}
.deal-view-btn {
  font-size: 12px; font-weight: 700; color: var(--accent);
  background: none; border: none; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 4px;
  transition: gap 0.2s;
}
.deal-view-btn:hover { gap: 8px; }

/* ─── AI RISK RIBBON ──────────────────── */
.risk-ribbon {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.risk-score {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 22px; border-radius: 4px;
  font-size: 11px; font-weight: 700;
}
.risk-score.a { background: var(--accent-dim); color: var(--accent); }
.risk-score.b { background: var(--accent-dim); color: var(--accent); }
.risk-score.c { background: var(--amber-dim); color: var(--amber); }
.risk-score.d { background: var(--red-dim); color: var(--red); }
.risk-bar-track { flex: 1; height: 4px; border-radius: 2px; background: var(--border-bright); }
.risk-bar-fill { height: 100%; border-radius: 2px; }
.risk-bar-fill.high { background: var(--accent); }
.risk-bar-fill.med { background: var(--amber); }
.risk-bar-fill.low { background: var(--red); }

/* ─── MODAL OVERLAY ───────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-bright);
  border-radius: 18px;
  width: 100%; max-width: 860px; max-height: 90vh;
  overflow-y: auto; position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

.modal-close {
  position: absolute; top: 20px; right: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-mid); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; z-index: 2;
}
.modal-close:hover { border-color: var(--text-dim); color: var(--text); }

.modal-hero {
  padding: 40px 40px 0;
}
.modal-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--red); margin-bottom: 12px;
}
.modal-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1s infinite; }
.modal-biz { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.modal-meta-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

.modal-fin-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 32px;
}
.modal-fin-block {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px; text-align: center;
}
.modal-fin-block .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.modal-fin-block .val { font-size: 22px; font-weight: 800; margin-top: 4px; letter-spacing: -0.3px; }
.modal-fin-block .val.accent { color: var(--accent); }

/* ─── AI ANALYSIS CARD ────────────────── */
.modal-ai {
  margin: 0 40px 32px;
  background: linear-gradient(135deg, rgba(0,232,123,0.04), rgba(0,201,255,0.02));
  border: 1px solid rgba(0,232,123,0.15);
  border-radius: var(--radius); padding: 28px;
}
.modal-ai-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.modal-ai-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
}
.modal-ai-item .ai-lbl { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
.modal-ai-item .ai-val { font-size: 18px; font-weight: 700; }
.modal-ai-item .ai-val.good { color: var(--accent); }
.modal-ai-item .ai-val.warn { color: var(--amber); }

/* ─── OFFERS TABLE ────────────────────── */
.modal-offers {
  margin: 0 40px 32px;
}
.modal-offers-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.modal-offers-header h3 {
  font-size: 17px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.offer-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 10px; border-radius: 100px;
  background: var(--accent-dim); color: var(--accent);
  font-size: 12px; font-weight: 700;
}

.offer-table { width: 100%; border-collapse: collapse; }
.offer-table th {
  text-align: left; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-dim); padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.offer-table td {
  padding: 14px; border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.offer-table tr:last-child td { border-bottom: none; }
.offer-table tr:hover td { background: rgba(255,255,255,0.01); }
.offer-funder { font-weight: 600; }
.offer-amount { font-weight: 700; }
.offer-factor { color: var(--text-mid); }
.offer-status-badge {
  display: inline-flex; padding: 4px 12px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
}
.offer-status-badge.active { background: var(--accent-dim); color: var(--accent); }
.offer-status-badge.reviewing { background: var(--amber-dim); color: var(--amber); }
.offer-status-badge.declined { background: var(--red-dim); color: var(--red); }
.offer-accept-btn {
  background: var(--accent); color: var(--bg); border: none;
  padding: 6px 16px; border-radius: 100px; font-weight: 700;
  font-size: 12px; cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.offer-accept-btn:hover { box-shadow: 0 4px 16px var(--accent-glow); }

/* ─── DEAL TIMELINE ───────────────────── */
.modal-timeline {
  margin: 0 40px 40px;
}
.modal-timeline h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.timeline-list { position: relative; padding-left: 24px; }
.timeline-list::before {
  content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px;
  width: 2px; background: var(--border-bright);
}
.timeline-item {
  position: relative; padding: 0 0 20px 16px; font-size: 13px;
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-item::before {
  content: ''; position: absolute; left: -22px; top: 5px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg-surface);
}
.timeline-item .tl-time { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.timeline-item .tl-event { color: var(--text-mid); }
.timeline-item .tl-event strong { color: var(--text); }

/* ─── ACTIVITY FEED (RIGHT) ───────────── */
.activity-pulse {
  position: fixed; top: 80px; right: 24px; width: 260px;
  z-index: 50;
}
.activity-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  animation: slideIn 0.4s ease both;
  margin-bottom: 8px;
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(20px); }
  to { opacity:1; transform:translateX(0); }
}
.activity-card .act-header {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px;
}
.activity-card .act-header .blink {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  animation: pulse 1.5s infinite;
}
.activity-card .act-text { font-size: 13px; color: var(--text-mid); line-height: 1.4; }
.activity-card .act-text strong { color: var(--text); }
.activity-card .act-time { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

/* ─── RESPONSIVE ──────────────────────── */
@media (max-width: 1100px) {
  .activity-pulse { display: none; }
}
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .modal-fin-grid, .modal-ai-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .deal-grid { grid-template-columns: 1fr; }
  .modal-hero, .modal-ai, .modal-offers, .modal-timeline { padding-left: 20px; padding-right: 20px; margin-left: 0; margin-right: 0; }
}

/* ─── FADE IN ─────────────────────────── */
.fade-in { animation: fadeUp 0.5s ease both; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<!-- ═══════ TOP NAV ═══════ -->
<nav class="topnav">
  <a href="privatecreditmca-landing.html" class="topnav-logo">
    <span class="dot"></span>
    PrivateCreditMCA
  </a>
  <div class="topnav-center">
    <a href="privatecreditmca-landing.html">Home</a>
    <a href="#" class="active">Marketplace</a>
    <a href="#">Pipeline</a>
    <a href="#">Funder Directory</a>
    <a href="#">Academy</a>
  </div>
  <div class="topnav-right">
    <button class="topnav-btn secondary">Log In</button>
    <button class="topnav-btn" onclick="openSubmit()">+ Submit a Deal</button>
  </div>
</nav>

<!-- ═══════ APP LAYOUT ═══════ -->
<div class="app">

  <!-- ─── SIDEBAR ─── -->

// ═══════════════════════════════════════════
// FILTERS STATE
// ═══════════════════════════════════════════
let filters = { industry: 'all', status: 'all', risk: 'all' };

function toggleFilter(btn, type) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  filters[type] = btn.dataset.val;
  filterDeals();
}

function updateRange() {
  const v = document.getElementById('amountRange').value;
  document.getElementById('rangeVal').textContent = '$' + v + 'K';
  filterDeals();
}

function filterDeals() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const maxAmount = parseInt(document.getElementById('amountRange').value) * 1000;
  const sort = document.getElementById('sortSelect').value;

  let filtered = deals.filter(d => {
    if (filters.industry !== 'all' && d.industry !== filters.industry) return false;
    if (filters.status !== 'all' && d.status !== filters.status) return false;
    if (filters.risk !== 'all' && d.riskGrade !== filters.risk) return false;
    if (d.requested > maxAmount) return false;
    if (search && !d.biz.toLowerCase().includes(search) && !d.industry.toLowerCase().includes(search) && !d.state.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  if (sort === 'newest') { /* default order */ }
  else if (sort === 'amount-high') filtered.sort((a,b) => b.requested - a.requested);
  else if (sort === 'amount-low') filtered.sort((a,b) => a.requested - b.requested);
  else if (sort === 'offers') filtered.sort((a,b) => b.offers.length - a.offers.length);
  else if (sort === 'risk') filtered.sort((a,b) => b.riskScore - a.riskScore);

  renderDeals(filtered);
}

// ═══════════════════════════════════════════
// RENDER DEALS
// ═══════════════════════════════════════════
function fmt(n) { return n >= 1000 ? '$' + (n/1000).toFixed(0) + 'K' : '$' + n; }

function renderDeals(list) {
  const grid = document.getElementById('dealGrid');
  document.getElementById('dealCount').textContent = list.length;

  grid.innerHTML = list.map((d, i) => {
    const riskClass = d.riskGrade === 'A' ? 'a' : d.riskGrade === 'B' ? 'b' : d.riskGrade === 'C' ? 'c' : 'd';
    const barClass = d.riskScore >= 75 ? 'high' : d.riskScore >= 60 ? 'med' : 'low';
    const statusClass = d.status;
    const statusLabel = d.status.charAt(0).toUpperCase() + d.status.slice(1);

    return `
    <div class="deal-card fade-in" style="animation-delay:${i * 0.05}s" onclick="openDeal(${d.id})">
      <div class="deal-card-top">
        <div class="deal-status ${statusClass}">
          ${d.status === 'live' ? '<span class="dot"></span>' : ''}
          ${statusLabel}
        </div>
        <div class="deal-time mono">${d.time}</div>
      </div>
      <div class="deal-biz">${d.biz}</div>
      <div class="deal-meta-row">
        <span class="deal-tag industry">${d.industry}</span>
        <span class="deal-tag state">${d.state}</span>
      </div>
      <div class="risk-ribbon">
        <span class="risk-score ${riskClass}">${d.riskGrade}</span>
        <div class="risk-bar-track"><div class="risk-bar-fill ${barClass}" style="width:${d.riskScore}%"></div></div>
        <span class="mono" style="font-size:11px;color:var(--text-dim)">${d.riskScore}</span>
      </div>
      <div class="deal-financials">
        <div class="deal-fin-block">
          <div class="deal-fin-label">Requested</div>
          <div class="deal-fin-val">${fmt(d.requested)}</div>
        </div>
        <div class="deal-fin-block">
          <div class="deal-fin-label">Monthly Rev</div>
          <div class="deal-fin-val accent">${fmt(d.monthlyRev)}/mo</div>
        </div>
      </div>
      <div class="deal-offers-bar">
        <div class="deal-offer-count">
          <span class="cnt">${d.offers.length}</span>
          ${d.offers.length === 1 ? 'offer' : 'offers'}
        </div>
        <button class="deal-view-btn">View Deal →</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// MODAL

function openDeal(id) {
  const d = deals.find(x => x.id === id);
  if (!d) return;

  const riskClass = d.riskGrade === 'A' ? 'a' : d.riskGrade === 'B' ? 'b' : 'c';
  const statusClass = d.status;

  const offersHTML = d.offers.length > 0 ? `
    <div class="modal-offers">
      <div class="modal-offers-header">
        <h3>Competing Offers <span class="offer-count-badge">${d.offers.length}</span></h3>
      </div>
      <table class="offer-table">
        <thead>
          <tr>
            <th>Funder</th>
            <th>Amount</th>
            <th>Factor</th>
            <th>Cost</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${d.offers.map(o => `
          <tr>
            <td class="offer-funder">${o.funder}</td>
            <td class="offer-amount mono">${fmt(o.amount)}</td>
            <td class="offer-factor mono">${o.factor.toFixed(2)}</td>
            <td class="mono" style="color:var(--text-dim)">${fmt(Math.round(o.amount * o.factor))}</td>
            <td><span class="offer-status-badge ${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span></td>
            <td>${o.status === 'active' ? '<button class="offer-accept-btn" onclick="acceptOffer(event)">Accept</button>' : ''}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  ` : `
    <div class="modal-offers" style="text-align:center;padding:40px;">
      <div style="font-size:40px;margin-bottom:12px">⏳</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Waiting for Offers</div>
      <div style="font-size:14px;color:var(--text-dim)">Funders are reviewing this deal. Offers typically appear within 4 hours.</div>
    </div>
  `;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-hero">
      <div class="modal-status ${statusClass}">
        ${d.status === 'live' ? '<span class="dot"></span>' : ''}
        ${d.status.toUpperCase()} · ${d.time}
      </div>
      <div class="modal-biz">${d.biz}</div>
      <div class="modal-meta-tags">
        <span class="deal-tag industry">${d.industry}</span>
        <span class="deal-tag state">${d.state}</span>
        <span class="risk-score ${riskClass}" style="font-size:12px">${d.riskGrade} · ${d.riskScore}</span>
      </div>
      <div class="modal-fin-grid">
        <div class="modal-fin-block">
          <div class="lbl">Requested</div>
          <div class="val">${fmt(d.requested)}</div>
        </div>
        <div class="modal-fin-block">
          <div class="lbl">Monthly Rev</div>
          <div class="val accent">${fmt(d.monthlyRev)}</div>
        </div>
        <div class="modal-fin-block">
          <div class="lbl">Offers</div>
          <div class="val">${d.offers.length}</div>
        </div>
        <div class="modal-fin-block">
          <div class="lbl">Best Factor</div>
          <div class="val accent">${d.offers.length > 0 ? Math.min(...d.offers.filter(o=>o.status==='active').map(o=>o.factor)).toFixed(2) : '—'}</div>
        </div>
      </div>
    </div>

    <div class="modal-ai">
      <div class="modal-ai-label">🧠 AI BankIQ Analysis</div>
      <div class="modal-ai-grid">
        <div class="modal-ai-item">
          <div class="ai-lbl">Monthly Revenue</div>
          <div class="ai-val">${d.ai.revenue}</div>
        </div>
        <div class="modal-ai-item">
          <div class="ai-lbl">NSF Count</div>
          <div class="ai-val ${d.ai.nsf <= 2 ? 'good' : 'warn'}">${d.ai.nsf}</div>
        </div>
        <div class="modal-ai-item">
          <div class="ai-lbl">Risk Score</div>
          <div class="ai-val good">${d.ai.riskScore}</div>
        </div>
        <div class="modal-ai-item">
          <div class="ai-lbl">Approval Range</div>
          <div class="ai-val">${d.ai.approvalRange}</div>
        </div>
      </div>
    </div>

    ${offersHTML}

    <div class="modal-timeline">
      <h3>Deal Timeline</h3>

}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalForce();
}
function closeModalForce() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

  {text:'<strong>Apex Funding</strong> submitted an offer on <strong>QuickFix Auto</strong>'},

  {text:'<strong>Forward Financing</strong> is reviewing <strong>Golden Dragon Restaurant</strong>'},

  {text:'<strong>National Funding</strong> submitted an offer on <strong>AllStar Retail</strong>'},
  {text:'New deal posted: <strong>Harbor Fish Market</strong> — $50K requested'},
  {text:'<strong>Rapid Finance</strong> submitted an offer on <strong>Peak Roofing</strong>'},
  {text:'<strong>BridgeCap</strong> is reviewing <strong>Casa Verde Landscaping</strong>'},
  {text:'<strong>Fora Financial</strong> submitted an offer on <strong>Prestige Plumbing</strong>'},
];
let actIdx = 0;
function showActivity() {
  const container = document.getElementById('activityPulse');
  const msg = activityMessages[actIdx % activityMessages.length];
  actIdx++;

  const card = document.createElement('div');
  card.className = 'activity-card';
  card.innerHTML = `
    <div class="act-header"><span class="blink"></span> Activity</div>
    <div class="act-text">${msg.text}</div>
    <div class="act-time mono">Just now</div>
  `;
  container.prepend(card);

  // Keep max 3
  while (container.children.length > 3) {
    container.lastChild.remove();
  }

  // Update deal count randomly
  const statEl = document.getElementById('stat-deals');
  const current = parseInt(statEl.textContent);
  statEl.textContent = current + (Math.random() > 0.5 ? 1 : 0);
}

// Start activity feed
setTimeout(() => showActivity(), 3000);
setInterval(() => showActivity(), 8000);
