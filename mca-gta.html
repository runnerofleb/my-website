<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MCA Broker Simulator • 3D</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #040714; font-family: system-ui, -apple-system, sans-serif; color: #eaf1ff; user-select: none; }
    
    /* Glassmorphism UI */
    #ui {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(10, 15, 30, 0.6); border: 1px solid rgba(50, 80, 200, 0.4);
      border-radius: 16px; padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      width: min(320px, calc(100vw - 32px)); backdrop-filter: blur(12px);
    }
    
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .k { opacity: 0.7; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}
    .v { font-weight: 900; font-size: 15px; text-align: right; }
    .money { color: #22c55e; font-size: 20px; }
    
    .tip { opacity: 0.7; font-weight: 600; font-size: 12px; line-height: 1.5; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;}
    
    /* Stamina Bar */
    #stamina-bg { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    #stamina-fill { width: 100%; height: 100%; background: #38bdf8; transition: width 0.1s linear; }

    /* Interaction Prompt */
    #interact {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 80px; z-index: 10;
      background: #eaf1ff; color: #040714; padding: 10px 20px; border-radius: 8px;
      font-weight: 900; font-size: 16px; display: none; box-shadow: 0 0 20px rgba(234, 241, 255, 0.5);
    }
    
    /* Action Progress Bar */
    #progress-container {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 40px; z-index: 10;
      width: 300px; height: 12px; background: rgba(0,0,0,0.8); border: 2px solid #eaf1ff;
      border-radius: 6px; display: none; overflow: hidden;
    }
    #progress-bar { width: 0%; height: 100%; background: #22c55e; }

    /* Toasts */
    #toast {
      position: fixed; left: 50%; transform: translateX(-50%); top: 20px; z-index: 10;
      background: rgba(20, 30, 60, 0.95); border: 1px solid #38bdf8;
      padding: 12px 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      font-weight: 800; opacity: 0; transition: opacity 0.3s, top 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; top: 40px; }
    
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="row"><div class="k">Bank</div><div class="v money" id="cash">$500</div></div>
    <div class="row"><div class="k">Deal Status</div><div class="v" id="mission" style="color:#38bdf8">Need Leads</div></div>
    <div class="row"><div class="k">Stamina</div></div>
    <div id="stamina-bg"><div id="stamina-fill"></div></div>
    <div class="tip">
      <b>WASD</b> Move • <b>SHIFT</b> Hustle (Sprint)<br>
      <b>MOUSE</b> Look • <b>SPACE</b> Interact
    </div>
  </div>
  
  <div id="interact">PRESS [SPACE] TO BUY LEADS</div>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="toast"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // ---------- GAME STATE & UI ----------
    let cash = 500;
    let stamina = 100;
    let missionState = 0; // 0: Leads, 1: Merchant, 2: Funder, 3: Bank
    let isInteracting = false;
    let currentMarker = null;

    const uiCash = document.getElementById("cash");
    const uiMission = document.getElementById("mission");
    const uiStamina = document.getElementById("stamina-fill");
    const uiInteract = document.getElementById("interact");
    const uiProgContainer = document.getElementById("progress-container");
    const uiProgBar = document.getElementById("progress-bar");
    const toastEl = document.getElementById("toast");

    const states = [
      { id: "leads", name: "Buy Leads ($100)", color: 0x38bdf8, action: "BUYING LEADS...", time: 1000 },
      { id: "merchant", name: "Pitch Merchant", color: 0x22c55e, action: "PITCHING MCA...", time: 2500 },
      { id: "funder", name: "Secure Funding", color: 0xa78bfa, action: "NEGOTIATING TERMS...", time: 2000 },
      { id: "bank", name: "Close Deal", color: 0xf59e0b, action: "WIRING FUNDS...", time: 1500 }
    ];

    function showToast(msg, color = "#fff") {
      toastEl.textContent = msg;
      toastEl.style.color = color;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2000);
    }

    function updateHUD() {
      uiCash.textContent = "$" + cash.toLocaleString();
      uiMission.textContent = states[missionState].name;
      uiMission.style.color = "#" + states[missionState].color.toString(16).padStart(6, '0');
    }

    // ---------- SCENE SETUP ----------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x040714, 0.015);

    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const hemi = new THREE.HemisphereLight(0x4466ff, 0x040714, 0.6);
    scene.add(hemi);

    const moon = new THREE.DirectionalLight(0x88aaff, 1.2);
    moon.position.set(-20, 50, -20);
    moon.castShadow = true;
    moon.shadow.mapSize.set(2048, 2048);
    moon.shadow.camera.near = 0.5;
    moon.shadow.camera.far = 150;
    const d = 60;
    moon.shadow.camera.left = -d; moon.shadow.camera.right = d;
    moon.shadow.camera.top = d; moon.shadow.camera.bottom = -d;
    scene.add(moon);

    // Ground
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0f24, roughness: 0.9, metalness: 0.2 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), groundMat);
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(400, 80, 0x1c2b66, 0x0a102a);
    grid.position.y = 0.05;
    scene.add(grid);

    // ---------- CITY GENERATOR ----------
    const cityGroup = new THREE.Group();
    const bldgMat = new THREE.MeshStandardMaterial({ color: 0x0d1430, roughness: 0.8, metalness: 0.5 });
    
    // Create structured city blocks
    for(let x = -100; x <= 100; x += 35) {
      for(let z = -100; z <= 100; z += 35) {
        if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; // Central plaza clear
        if (Math.random() > 0.8) continue; // Leave some empty lots

        const w = 15 + Math.random() * 10;
        const d = 15 + Math.random() * 10;
        const h = 10 + Math.random() * 40;
        
        const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bldgMat);
        b.position.set(x + (Math.random()*4-2), h/2, z + (Math.random()*4-2));
        b.castShadow = true;
        b.receiveShadow = true;
        
        // Faux windows (simple wireframe overlay)
        const edges = new THREE.LineSegments(
          new THREE.EdgesGeometry(b.geometry),
          new THREE.LineBasicMaterial({ color: 0x2a3aa8, transparent: true, opacity: 0.3 })
        );
        b.add(edges);
        cityGroup.add(b);
      }
    }
    scene.add(cityGroup);

    // ---------- PLAYER (THE BROKER) ----------
    const human = new THREE.Group();
    const matSuit = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 }); // Dark suit
    const matSkin = new THREE.MeshStandardMaterial({ color: 0xffd1b3, roughness: 0.4 });
    const matTie = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2 });

    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.9, 4, 12), matSuit);
    torso.position.y = 1.6;
    torso.castShadow = true;
    human.add(torso);

    const tie = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.6), matTie);
    tie.position.set(0, 1.6, 0.26);
    human.add(tie);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matSkin);
    head.position.y = 2.5;
    head.castShadow = true;
    human.add(head);

    // Limbs
    const limbGeo = new THREE.CapsuleGeometry(0.18, 0.6, 4, 8);
    const legL = new THREE.Mesh(limbGeo, matSuit); legL.position.set(-0.25, 0.6, 0); legL.castShadow = true;
    const legR = new THREE.Mesh(limbGeo, matSuit); legR.position.set(0.25, 0.6, 0); legR.castShadow = true;
    human.add(legL, legR);

    const armL = new THREE.Mesh(limbGeo, matSuit); armL.position.set(-0.75, 1.6, 0); armL.castShadow = true;
    const armR = new THREE.Mesh(limbGeo, matSuit); armR.position.set(0.75, 1.6, 0); armR.castShadow = true;
    human.add(armL, armR);

    // Briefcase
    const caseGeo = new THREE.BoxGeometry(0.2, 0.4, 0.5);
    const caseMat = new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 });
    const briefcase = new THREE.Mesh(caseGeo, caseMat);
    briefcase.position.set(0, -0.4, 0);
    briefcase.castShadow = true;
    armR.add(briefcase);

    scene.add(human);

    // ---------- LOCATIONS & MARKERS ----------
    const markers = {};
    
    function createMarker(stateObj, x, z) {
      const g = new THREE.Group();
      
      const pad = new THREE.Mesh(
        new THREE.CylinderGeometry(2, 2, 0.2, 32),
        new THREE.MeshStandardMaterial({ color: stateObj.color, emissive: stateObj.color, emissiveIntensity: 0.4 })
      );
      pad.position.y = 0.1;
      g.add(pad);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.8, 0.08, 8, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 })
      );
      ring.rotation.x = -Math.PI/2;
      ring.position.y = 0.3;
      g.add(ring);
      
      // Floating particles
      const pGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
      const pMat = new THREE.MeshBasicMaterial({ color: stateObj.color });
      for(let i=0; i<3; i++) {
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.set((Math.random()-0.5)*2, 1+Math.random()*2, (Math.random()-0.5)*2);
        p.userData = { speed: Math.random()*0.02 + 0.01, offset: Math.random()*Math.PI*2 };
        g.add(p);
      }

      const light = new THREE.PointLight(stateObj.color, 2, 15);
      light.position.y = 2;
      g.add(light);

      g.position.set(x, 0, z);
      g.userData = { id: stateObj.id, stateIndex: states.indexOf(stateObj) };
      scene.add(g);
      return g;
    }

    // Place locations around the central plaza
    markers.leads = createMarker(states[0], -25, 25);
    markers.merchant = createMarker(states[1], 25, 25);
    markers.funder = createMarker(states[2], 25, -25);
    markers.bank = createMarker(states[3], -25, -25);

    const markerList = Object.values(markers);

    // ---------- CONTROLS & PHYSICS ----------
    const keys = {};
    addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "Space") handleAction(); });
    addEventListener("keyup", e => keys[e.code] = false);

    let yaw = 0, pitch = -0.2;
    let dragging = false;
    renderer.domElement.addEventListener("mousedown", () => document.body.requestPointerLock());
    document.addEventListener("pointerlockchange", () => { dragging = !!document.pointerLockElement; });
    addEventListener("mousemove", (e) => {
      if(!dragging) return;
      yaw -= e.movementX * 0.003;
      pitch -= e.movementY * 0.003;
      pitch = Math.max(-0.6, Math.min(0.4, pitch)); // Clamp camera
    });

    const vel = new THREE.Vector3();
    const dir = new THREE.Vector3();

    function handleAction() {
      if (!currentMarker || isInteracting) return;
      const targetState = currentMarker.userData.stateIndex;
      
      if (targetState !== missionState) {
        showToast("Not ready for this yet. " + states[missionState].name + " first!", "#ef4444");
        return;
      }

      // Check cash requirement for leads
      if (missionState === 0 && cash < 100) {
        showToast("You're broke! Game Over.", "#ef4444");
        return;
      }

      isInteracting = true;
      uiInteract.style.display = "none";
      uiProgContainer.style.display = "block";
      uiProgBar.style.width = "0%";
      
      const s = states[missionState];
      showToast(s.action, "#" + s.color.toString(16).padStart(6,'0'));

      let progress = 0;
      const interval = setInterval(() => {
        progress += 50; // update every 50ms
        uiProgBar.style.width = (progress / s.time) * 100 + "%";
        
        if (progress >= s.time) {
          clearInterval(interval);
          completeAction();
        }
      }, 50);
    }

    function completeAction() {
      isInteracting = false;
      uiProgContainer.style.display = "none";
      
      // Economy Logic
      if (missionState === 0) { cash -= 100; showToast("Bought Leads! -$100", "#ef4444"); }
      if (missionState === 3) { cash += 600; showToast("Deal Funded! Commission: +$600", "#22c55e"); }

      // Advance State
      missionState = (missionState + 1) % states.length;
      updateHUD();
      
      // Force UI refresh for prompt
      currentMarker = null; 
    }

    function update(dt) {
      if (isInteracting) return; // Freeze movement while acting

      // Movement logic
      const forward = (keys["KeyW"] || keys["ArrowUp"]) ? 1 : 0;
      const back = (keys["KeyS"] || keys["ArrowDown"]) ? 1 : 0;
      const left = (keys["KeyA"] || keys["ArrowLeft"]) ? 1 : 0;
      const right = (keys["KeyD"] || keys["ArrowRight"]) ? 1 : 0;

      let isSprinting = keys["ShiftLeft"] || keys["ShiftRight"];
      if (isSprinting && stamina > 0 && (forward || back || left || right)) {
        stamina = Math.max(0, stamina - 40 * dt);
      } else {
        isSprinting = false;
        stamina = Math.min(100, stamina + 15 * dt);
      }
      uiStamina.style.width = stamina + "%";
      uiStamina.style.background = stamina < 20 ? "#ef4444" : "#38bdf8";

      const speed = isSprinting ? 12.0 : 5.0;

      dir.set(right - left, 0, back - forward);
      if (dir.lengthSq() > 0) {
        dir.normalize();
        const sin = Math.sin(yaw), cos = Math.cos(yaw);
        vel.x = dir.x * cos + dir.z * sin;
        vel.z = -dir.x * sin + dir.z * cos;

        human.rotation.y = Math.atan2(vel.x, vel.z);
      } else {
        vel.set(0, 0, 0);
      }

      human.position.x += vel.x * speed * dt;
      human.position.z += vel.z * speed * dt;

      // Map bounds
      human.position.x = Math.max(-140, Math.min(140, human.position.x));
      human.position.z = Math.max(-140, Math.min(140, human.position.z));

      // Animations
      const t = performance.now() * 0.01;
      const moving = vel.lengthSq() > 0.01;
      const animSpeed = isSprinting ? 1.5 : 0.8;
      
      legL.rotation.x = moving ? Math.sin(t * animSpeed) * 0.7 : 0;
      legR.rotation.x = moving ? -Math.sin(t * animSpeed) * 0.7 : 0;
      armL.rotation.x = moving ? -Math.sin(t * animSpeed) * 0.5 : 0;
      armR.rotation.x = moving ? Math.sin(t * animSpeed) * 0.5 : 0; // Briefcase arm swings!

      // Marker Interactions & Animations
      let nearMarker = null;
      markerList.forEach(m => {
        // Animate marker particles
        m.children.forEach(c => {
          if(c.userData.speed) {
            c.position.y = 1.5 + Math.sin(t * c.userData.speed + c.userData.offset) * 0.5;
            c.rotation.x += 0.02; c.rotation.y += 0.02;
          }
        });
        // Check proximity
        if (human.position.distanceTo(m.position) < 3.0) nearMarker = m;
      });

      if (nearMarker !== currentMarker) {
        currentMarker = nearMarker;
        if (currentMarker) {
          const s = states[currentMarker.userData.stateIndex];
          uiInteract.textContent = `PRESS [SPACE] TO ${s.name.toUpperCase()}`;
          uiInteract.style.display = "block";
          uiInteract.style.color = "#040714";
          uiInteract.style.background = "#" + s.color.toString(16).padStart(6,'0');
        } else {
          uiInteract.style.display = "none";
        }
      }

      // Camera Follow
      const target = new THREE.Vector3(human.position.x, 2.0, human.position.z);
      const camDist = 8;
      const cx = target.x + Math.sin(yaw) * camDist;
      const cz = target.z + Math.cos(yaw) * camDist;
      const cy = target.y + 2.5 + pitch * 8.0;

      camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.15);
      camera.lookAt(target);
    }

    let last = performance.now();
    function loop() {
      const now = performance.now();
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      update(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }
    
    updateHUD();
    loop();

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
