<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Underwriter's Dilemma: MCA Simulator</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
      --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #f59e0b;
    }
    
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
    
    body {
      margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
    }

    /* Top Stats Bar */
    #stats-container {
      width: 100%; max-width: 400px; padding: 20px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
      background: var(--panel); border-bottom: 2px solid #334155; z-index: 10;
    }
    
    .stat-box { display: flex; flex-direction: column; gap: 5px; }
    .stat-label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #94a3b8; display: flex; justify-content: space-between;}
    .stat-bar-bg { width: 100%; height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
    .stat-bar-fill { height: 100%; width: 50%; transition: width 0.3s ease, background-color 0.3s ease; }

    /* Card Play Area */
    #game-area {
      flex: 1; width: 100%; max-width: 400px; position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .card {
      position: absolute; width: 320px; height: 420px;
      background: white; color: #0f172a; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; padding: 24px;
      transform-origin: 50% 100%; transition: transform 0.3s ease, opacity 0.3s ease;
      cursor: grab;
    }
    .card:active { cursor: grabbing; }
    
    .merchant-type { font-size: 14px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;}
    .merchant-pitch { font-size: 20px; font-weight: 700; flex: 1; line-height: 1.4; }
    .merchant-data { background: #f1f5f9; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-bottom: 20px;}
    
    .stamp {
      position: absolute; top: 40px; font-size: 32px; font-weight: 900; text-transform: uppercase;
      border: 4px solid; border-radius: 8px; padding: 5px 10px; opacity: 0; pointer-events: none;
    }
    #stamp-decline { right: 20px; color: var(--red); border-color: var(--red); transform: rotate(15deg); }
    #stamp-fund { left: 20px; color: var(--green); border-color: var(--green); transform: rotate(-15deg); }

    /* Action Buttons */
    #controls {
      width: 100%; max-width: 400px; padding: 20px;
      display: flex; justify-content: space-between; gap: 20px; z-index: 10;
    }
    .btn {
      flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: 800;
      cursor: pointer; transition: transform 0.1s; color: white; text-transform: uppercase;
    }
    .btn:active { transform: scale(0.95); }
    .btn-decline { background: var(--red); box-shadow: 0 4px 0 #b91c1c; }
    .btn-fund { background: var(--green); box-shadow: 0 4px 0 #047857; }

    /* Game Over Screen */
    #game-over {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95); display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 50; padding: 20px; text-align: center;
    }
    #game-over h1 { font-size: 40px; color: var(--red); margin-bottom: 10px; }
    #game-over p { font-size: 18px; line-height: 1.5; margin-bottom: 30px; }
    #restart-btn { background: var(--blue); padding: 16px 32px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }

  </style>
</head>
<body>

  <div id="stats-container">
    <div class="stat-box">
      <div class="stat-label"><span>Liquidity</span> <span id="val-liquidity">50%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-liquidity" style="background: var(--blue);"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label"><span>Yield (Profit)</span> <span id="val-yield">50%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-yield" style="background: var(--green);"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label"><span>Broker Relations</span> <span id="val-brokers">50%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-brokers" style="background: var(--yellow);"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label"><span>Default Rate</span> <span id="val-defaults">20%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" id="bar-defaults" style="background: var(--red);"></div></div>
    </div>
  </div>

  <div id="game-area">
    </div>

  <div id="controls">
    <button class="btn btn-decline" onclick="handleChoice('decline')">Swipe Left<br><small>Decline</small></button>
    <button class="btn btn-fund" onclick="handleChoice('fund')">Swipe Right<br><small>Fund Deal</small></button>
  </div>

  <div id="game-over">
    <h1 id="go-title">BANKRUPT</h1>
    <p id="go-desc">You funded too many bad deals and the credit facility pulled your lines.</p>
    <button id="restart-btn" onclick="location.reload()">Start New Fund</button>
  </div>

  <script>
    // --- GAME STATE ---
    // Stats range from 0 to 100. 
    // If Liquidity, Yield, or Brokers hit 0, you lose.
    // If Defaults hit 100, you lose.
    let stats = { liquidity: 50, yield: 50, brokers: 70, defaults: 20 };
    let currentCardEl = null;
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    let daysSurvived = 0;

    // --- THE MERCHANTS (The Database) ---
    // [liquidity, yield, brokers, defaults] changes
    const deck = [
      {
        type: "Trucking / Logistics",
        pitch: "Owner-operator needs $40k to fix a transmission. He has 1 truck. It is currently impounded.",
        data: "Avg Daily Bal: $400 | NSFs: 8 | FICO: 520",
        fund: [-15, +5, +10, +25], // Costs cash, slight profit if he pays, brokers love it, massive default risk
        decline: [0, 0, -10, 0]    // Safe, but brokers get annoyed you declined paper
      },
      {
        type: "Dental Clinic",
        pitch: "Established practice doing $250k/mo. Needs $100k for 'marketing'. Clean statements.",
        data: "Avg Daily Bal: $45,000 | NSFs: 0 | FICO: 720",
        fund: [-30, +15, +5, -5], // Huge cash drain, great profit, lowers overall default rate
        decline: [0, -5, -20, 0]  // Brokers furious you passed on an A-paper deal
      },
      {
        type: "Bodega / Deli",
        pitch: "Corner store wants $15k to buy a bitcoin ATM. Willing to sign a Confession of Judgment.",
        data: "Avg Daily Bal: $1,200 | NSFs: 3 | FICO: 600",
        fund: [-5, +10, +5, +10], 
        decline: [0, 0, -5, 0]
      },
      {
        type: "Construction",
        pitch: "Contractor is stacking 3 other advances. 'I just need one more to finish this huge government job!'",
        data: "Avg Daily Bal: $8,000 | NSFs: 12 | Positions: 3rd",
        fund: [-20, +25, +10, +30], // Massive yield potential, absolute garbage risk
        decline: [0, 0, -5, -5] 
      },
      {
        type: "E-Commerce",
        pitch: "Dropshipper whose Facebook ad account just got banned. Needs $20k to pivot to TikTok.",
        data: "Avg Daily Bal: $15,000 -> $200 | NSFs: 1 | FICO: 680",
        fund: [-10, +5, 0, +20], 
        decline: [+5, 0, -5, 0] // Saved money
      },
      {
        type: "Restaurant",
        pitch: "Your top ISO calls you: 'Trust me bro, this guy is solid. Just overlook the 14 negative days.'",
        data: "Avg Daily Bal: -$40 | NSFs: 14 | FICO: 480",
        fund: [-10, +10, +20, +25], // Brokers love you, but it's pure poison
        decline: [0, 0, -25, 0]     // Piss off your best broker
      }
    ];

    let currentMerchant = null;

    // --- CORE LOGIC ---
    function updateUI() {
      // Clamp values
      for (let key in stats) {
        stats[key] = Math.max(0, Math.min(100, stats[key]));
      }

      document.getElementById('bar-liquidity').style.width = stats.liquidity + '%';
      document.getElementById('val-liquidity').innerText = stats.liquidity + '%';
      
      document.getElementById('bar-yield').style.width = stats.yield + '%';
      document.getElementById('val-yield').innerText = stats.yield + '%';
      
      document.getElementById('bar-brokers').style.width = stats.brokers + '%';
      document.getElementById('val-brokers').innerText = stats.brokers + '%';
      
      document.getElementById('bar-defaults').style.width = stats.defaults + '%';
      document.getElementById('val-defaults').innerText = stats.defaults + '%';

      checkGameOver();
    }

    function checkGameOver() {
      const go = document.getElementById('game-over');
      const title = document.getElementById('go-title');
      const desc = document.getElementById('go-desc');
      let lost = true;

      if (stats.liquidity <= 0) {
        title.innerText = "OUT OF CAPITAL"; desc.innerText = `You ran out of money to fund deals. You survived ${daysSurvived} deals.`;
      } else if (stats.yield <= 0) {
        title.innerText = "UNPROFITABLE"; desc.innerText = `Your fund bled money. The investors pulled out. You survived ${daysSurvived} deals.`;
      } else if (stats.brokers <= 0) {
        title.innerText = "BLACKLISTED"; desc.innerText = `You declined too many deals. Brokers stopped sending you files. You starved to death. You survived ${daysSurvived} deals.`;
      } else if (stats.defaults >= 100) {
        title.innerText = "DEFAULT CRISIS"; desc.innerText = `You funded absolute garbage. Your portfolio defaulted. You survived ${daysSurvived} deals.`;
      } else {
        lost = false;
      }

      if (lost) {
        go.style.display = 'flex';
      }
    }

    function spawnCard() {
      currentMerchant = deck[Math.floor(Math.random() * deck.length)];
      
      const gameArea = document.getElementById('game-area');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="stamp" id="stamp-decline">DECLINED</div>
        <div class="stamp" id="stamp-fund">FUNDED</div>
        <div class="merchant-type">${currentMerchant.type}</div>
        <div class="merchant-pitch">"${currentMerchant.pitch}"</div>
        <div class="merchant-data">${currentMerchant.data}</div>
      `;
      
      gameArea.appendChild(card);
      currentCardEl = card;

      // Setup Dragging (Touch & Mouse)
      card.addEventListener('pointerdown', startDrag);
      window.addEventListener('pointermove', drag);
      window.addEventListener('pointerup', endDrag);
    }

    // --- SWIPE MECHANICS ---
    function startDrag(e) {
      isDragging = true;
      startX = e.clientX;
      currentCardEl.style.transition = 'none'; // remove smooth snap while dragging
    }

    function drag(e) {
      if (!isDragging || !currentCardEl) return;
      currentX = e.clientX - startX;
      
      // Rotate slightly as you drag
      const rotate = currentX * 0.1;
      currentCardEl.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

      // Show Stamps based on drag direction
      const declineStamp = currentCardEl.querySelector('#stamp-decline');
      const fundStamp = currentCardEl.querySelector('#stamp-fund');
      
      if (currentX < -50) { declineStamp.style.opacity = Math.min(1, Math.abs(currentX)/150); fundStamp.style.opacity = 0; }
      else if (currentX > 50) { fundStamp.style.opacity = Math.min(1, Math.abs(currentX)/150); declineStamp.style.opacity = 0; }
      else { declineStamp.style.opacity = 0; fundStamp.style.opacity = 0; }
    }

    function endDrag() {
      if (!isDragging || !currentCardEl) return;
      isDragging = false;
      currentCardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';

      if (currentX > 100) { handleChoice('fund', true); }
      else if (currentX < -100) { handleChoice('decline', true); }
      else { 
        // Snap back to center
        currentCardEl.style.transform = `translateX(0px) rotate(0deg)`; 
        currentCardEl.querySelector('#stamp-decline').style.opacity = 0;
        currentCardEl.querySelector('#stamp-fund').style.opacity = 0;
      }
      currentX = 0;
    }

    function handleChoice(action, fromDrag = false) {
      if (!currentCardEl) return;
      daysSurvived++;

      // Apply Stat Changes
      const effects = action === 'fund' ? currentMerchant.fund : currentMerchant.decline;
      stats.liquidity += effects[0];
      stats.yield += effects[1];
      stats.brokers += effects[2];
      stats.defaults += effects[3];

      // Natural decay/recovery (keeps the game moving)
      stats.liquidity += 2; // Slowly collect payments
      stats.defaults = Math.max(0, stats.defaults - 1); // Old bad debt washes out

      // Animate card away
      const throwX = action === 'fund' ? 400 : -400;
      const throwRot = action === 'fund' ? 45 : -45;
      
      if (!fromDrag) {
         currentCardEl.querySelector(action === 'fund' ? '#stamp-fund' : '#stamp-decline').style.opacity = 1;
      }

      currentCardEl.style.transform = `translateX(${throwX}px) rotate(${throwRot}deg)`;
      currentCardEl.style.opacity = 0;
      
      const oldCard = currentCardEl;
      currentCardEl = null;

      setTimeout(() => {
        oldCard.remove();
        updateUI();
        if (document.getElementById('game-over').style.display !== 'flex') {
          spawnCard();
        }
      }, 300);
    }

    // Init Game
    updateUI();
    spawnCard();

  </script>
</body>
</html>
