<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MCA Broker Simulator • Phase 1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #040714; font-family: system-ui, -apple-system, sans-serif; color: #eaf1ff; user-select: none; }
    
    #ui {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(10, 15, 30, 0.7); border: 1px solid rgba(50, 80, 200, 0.4);
      border-radius: 12px; padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      width: min(320px, calc(100vw - 32px)); backdrop-filter: blur(12px);
    }
    
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .k { opacity: 0.7; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}
    .v { font-weight: 900; font-size: 15px; text-align: right; }
    .money { color: #22c55e; font-size: 20px; }
    
    .tip { opacity: 0.7; font-weight: 600; font-size: 12px; line-height: 1.5; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px;}
    
    #interact {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 80px; z-index: 10;
      background: #eaf1ff; color: #040714; padding: 10px 20px; border-radius: 8px;
      font-weight: 900; font-size: 16px; display: none; box-shadow: 0 0 20px rgba(234, 241, 255, 0.5);
      cursor: pointer;
    }
    
    #toast {
      position: fixed; left: 50%; transform: translateX(-50%); top: 20px; z-index: 10;
      background: rgba(20, 30, 60, 0.95); border: 1px solid #38bdf8;
      padding: 12px 24px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      font-weight: 800; opacity: 0; transition: opacity 0.3s, top 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; top: 40px; }
    
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="row"><div class="k">Bank</div><div class="v money" id="cash">$500</div></div>
    <div class="row"><div class="k">Current Task</div><div class="v" id="mission" style="color:#38bdf8">Find Leads</div></div>
    <div class="tip">
      <b>LEFT CLICK</b> on the ground to move.<br>
      <b>CLICK</b> on glowing markers to interact.
    </div>
  </div>
  
  <div id="interact">CLICK TO BUY LEADS</div>
  <div id="toast"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // ---------- GAME STATE & UI ----------
    let cash = 500;
    let missionState = 0; 
    let currentMarker = null;

    const uiCash = document.getElementById("cash");
    const uiMission = document.getElementById("mission");
    const uiInteract = document.getElementById("interact");
    const toastEl = document.getElementById("toast");

    const states = [
      { id: "leads", name: "Buy Leads ($100)", color: 0x38bdf8 },
      { id: "merchant", name: "Pitch Merchant", color: 0x22c55e },
      { id: "funder", name: "Secure Funding", color: 0xa78bfa },
      { id: "bank", name: "Close Deal", color: 0xf59e0b }
    ];

    function showToast(msg, color = "#fff") {
      toastEl.textContent = msg;
      toastEl.style.color = color;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2000);
    }

    function updateHUD() {
      uiCash.textContent = "$" + cash.toLocaleString();
      uiMission.textContent = states[missionState].name;
      uiMission.style.color = "#" + states[missionState].color.toString(16).padStart(6, '0');
    }

    // ---------- SCENE SETUP ----------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x040714, 0.015);

    const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0x4466ff, 0x040714, 0.6);
    scene.add(hemi);

    const moon = new THREE.DirectionalLight(0x88aaff, 1.2);
    moon.position.set(-20, 50, -20);
    moon.castShadow = true;
    moon.shadow.camera.left = -60; moon.shadow.camera.right = 60;
    moon.shadow.camera.top = 60; moon.shadow.camera.bottom = -60;
    scene.add(moon);

    // Ground (Must be interactive for Raycasting)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(800, 800),
      new THREE.MeshStandardMaterial({ color: 0x0a0f24, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(400, 80, 0x1c2b66, 0x0a102a);
    grid.position.y = 0.05;
    scene.add(grid);

    // Click Visualizer (The "Sims" move-here marker)
    const clickMarker = new THREE.Mesh(
      new THREE.RingGeometry(0.5, 0.8, 16),
      new THREE.MeshBasicMaterial({ color: 0x22c55e, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
    );
    clickMarker.rotation.x = -Math.PI/2;
    clickMarker.visible = false;
    scene.add(clickMarker);

    // ---------- PLAYER ----------
    const human = new THREE.Group();
    const matSuit = new THREE.MeshStandardMaterial({ color: 0x111111 }); 
    const matSkin = new THREE.MeshStandardMaterial({ color: 0xffd1b3 });

    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.9, 4, 12), matSuit);
    torso.position.y = 1.6; torso.castShadow = true; human.add(torso);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), matSkin);
    head.position.y = 2.5; head.castShadow = true; human.add(head);

    const limbGeo = new THREE.CapsuleGeometry(0.18, 0.6, 4, 8);
    const legL = new THREE.Mesh(limbGeo, matSuit); legL.position.set(-0.25, 0.6, 0); legL.castShadow = true;
    const legR = new THREE.Mesh(limbGeo, matSuit); legR.position.set(0.25, 0.6, 0); legR.castShadow = true;
    human.add(legL, legR);

    const armL = new THREE.Mesh(limbGeo, matSuit); armL.position.set(-0.75, 1.6, 0); armL.castShadow = true;
    const armR = new THREE.Mesh(limbGeo, matSuit); armR.position.set(0.75, 1.6, 0); armR.castShadow = true;
    human.add(armL, armR);

    scene.add(human);

    // ---------- LOCATIONS ----------
    const markers = [];
    function createMarker(stateObj, x, z) {
      const g = new THREE.Group();
      const pad = new THREE.Mesh(
        new THREE.CylinderGeometry(2, 2, 0.2, 32),
        new THREE.MeshStandardMaterial({ color: stateObj.color, emissive: stateObj.color, emissiveIntensity: 0.4 })
      );
      pad.position.y = 0.1;
      g.add(pad);
      
      const light = new THREE.PointLight(stateObj.color, 2, 15);
      light.position.y = 2;
      g.add(light);

      g.position.set(x, 0, z);
      g.userData = { stateIndex: states.indexOf(stateObj) };
      scene.add(g);
      markers.push(g);
    }

    createMarker(states[0], -25, 25);
    createMarker(states[1], 25, 25);
    createMarker(states[2], 25, -25);
    createMarker(states[3], -25, -25);

    // ---------- RAYCASTING & MOVEMENT (THE SIMS ENGINE) ----------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let targetPosition = new THREE.Vector3();
    let isMoving = false;

    window.addEventListener('pointerdown', (event) => {
      // Don't move if clicking the UI button
      if (event.target.id === "interact") return;

      // Calculate mouse position in normalized device coordinates (-1 to +1)
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      // Check if we clicked the ground
      const intersects = raycaster.intersectObject(ground);
      if (intersects.length > 0) {
        targetPosition.copy(intersects[0].point);
        targetPosition.y = 0; // Keep target flat on the ground
        isMoving = true;
        
        // Move the visual marker to the click spot
        clickMarker.position.copy(targetPosition);
        clickMarker.position.y = 0.15;
        clickMarker.visible = true;
        clickMarker.scale.set(1, 1, 1);
      }
    });

    // Handle clicking the interaction button
    uiInteract.addEventListener('click', () => {
      if (!currentMarker) return;
      const targetState = currentMarker.userData.stateIndex;
      
      if (targetState !== missionState) {
        showToast("Finish your current task first!", "#ef4444");
        return;
      }
      if (missionState === 0 && cash < 100) {
        showToast("You're broke!", "#ef4444");
        return;
      }

      if (missionState === 0) { cash -= 100; showToast("Bought Leads! -$100", "#ef4444"); }
      if (missionState === 3) { cash += 600; showToast("Deal Funded! Commission: +$600", "#22c55e"); }

      missionState = (missionState + 1) % states.length;
      updateHUD();
    });

    function update(dt) {
      // Click Marker Animation
      if (clickMarker.visible) {
        clickMarker.scale.x -= dt * 2;
        clickMarker.scale.y -= dt * 2;
        if (clickMarker.scale.x <= 0) clickMarker.visible = false;
      }

      // Movement Logic
      const speed = 8.0;
      let movingAnim = false;

      if (isMoving) {
        const dist = human.position.distanceTo(targetPosition);
        if (dist > 0.2) {
          movingAnim = true;
          // Calculate direction to walk
          const dir = new THREE.Vector3().subVectors(targetPosition, human.position).normalize();
          human.position.addScaledVector(dir, speed * dt);
          
          // Rotate smoothly towards target
          const targetRotation = Math.atan2(dir.x, dir.z);
          
          // Smooth rotation (Lerp)
          let angleDiff = targetRotation - human.rotation.y;
          // Normalize angle to prevent spinning the long way
          while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
          while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
          
          human.rotation.y += angleDiff * 10 * dt;

        } else {
          isMoving = false; // We arrived
        }
      }

      // Animations
      const t = performance.now() * 0.01;
      legL.rotation.x = movingAnim ? Math.sin(t) * 0.7 : 0;
      legR.rotation.x = movingAnim ? -Math.sin(t) * 0.7 : 0;
      armL.rotation.x = movingAnim ? -Math.sin(t) * 0.5 : 0;
      armR.rotation.x = movingAnim ? Math.sin(t) * 0.5 : 0;

      // Interaction Proximity
      let nearMarker = null;
      markers.forEach(m => {
        if (human.position.distanceTo(m.position) < 3.0) nearMarker = m;
      });

      if (nearMarker !== currentMarker) {
        currentMarker = nearMarker;
        if (currentMarker) {
          const s = states[currentMarker.userData.stateIndex];
          uiInteract.textContent = s.name.toUpperCase();
          uiInteract.style.display = "block";
        } else {
          uiInteract.style.display = "none";
        }
      }

      // Camera: High-Angle "Sims" Perspective
      const camOffset = new THREE.Vector3(-10, 15, -15); // Isometric-ish offset
      const desiredCamPos = human.position.clone().add(camOffset);
      camera.position.lerp(desiredCamPos, 0.1);
      camera.lookAt(human.position.clone().add(new THREE.Vector3(0, 1, 0)));
    }

    let last = performance.now();
    function loop() {
      const now = performance.now();
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      update(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }
    
    updateHUD();
    loop();

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
