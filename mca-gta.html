<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boiler Room Tycoon</title>
  <style>
    :root {
      --bg: #0a0a0a; --panel: #171717; --text: #fafafa;
      --green: #22c55e; --green-glow: rgba(34, 197, 94, 0.4);
      --blue: #3b82f6; --gray: #404040;
    }
    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
    body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* Top Bar */
    #top-bar {
      position: absolute; top: 0; left: 0; width: 100%; height: 80px; background: #000;
      border-bottom: 2px solid #262626; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 10;
    }
    .brand { font-size: 24px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; color: #737373;}
    .brand span { color: var(--blue); }
    
    .bank-container { text-align: right; }
    .bank-label { font-size: 14px; font-weight: 700; color: #a3a3a3; text-transform: uppercase; }
    #bank-balance { font-size: 36px; font-weight: 900; color: var(--green); text-shadow: 0 0 15px var(--green-glow); }
    #revenue-rate { font-size: 16px; color: #a3a3a3; font-weight: 600; }

    /* Main Layout */
    .col { height: calc(100vh - 80px); margin-top: 80px; overflow-y: auto; padding: 20px; }
    #col-left { width: 300px; background: var(--panel); border-right: 1px solid #262626; }
    #col-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    #col-right { width: 340px; background: var(--panel); border-left: 1px solid #262626; }

    /* The Big Button */
    #dial-btn {
      width: 280px; height: 280px; border-radius: 50%; background: linear-gradient(145deg, #16a34a, #22c55e);
      border: 8px solid #000; box-shadow: 0 0 50px var(--green-glow), inset 0 10px 20px rgba(255,255,255,0.3);
      color: white; font-size: 48px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; outline: none; transition: transform 0.05s, box-shadow 0.1s;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
    }
    #dial-btn:active { transform: scale(0.92); box-shadow: 0 0 20px var(--green-glow); }
    #dial-btn span { font-size: 18px; font-weight: 700; opacity: 0.8; margin-top: 5px;}

    /* Floating Click Text */
    .float-text {
      position: absolute; color: white; font-size: 24px; font-weight: 900; pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    /* Lists (Brokers & Upgrades) */
    .section-title { font-size: 18px; font-weight: 900; text-transform: uppercase; color: #737373; margin-bottom: 15px; border-bottom: 2px solid #262626; padding-bottom: 10px; }
    
    .item-card {
      background: #000; border: 1px solid #262626; border-radius: 12px; padding: 15px; margin-bottom: 15px;
      display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer;
    }
    .item-card:hover { border-color: var(--blue); background: #0a0a0a; }
    .item-card.disabled { opacity: 0.5; cursor: not-allowed; border-color: #262626; }
    .item-card.disabled:hover { background: #000; }
    
    .item-info h3 { margin: 0 0 4px 0; font-size: 16px; color: #fafafa; }
    .item-info p { margin: 0; font-size: 12px; color: #a3a3a3; font-weight: 600; }
    .item-cost { background: #171717; padding: 6px 10px; border-radius: 6px; font-size: 14px; font-weight: 800; color: var(--green); }
    
    .owned-count { font-size: 20px; font-weight: 900; color: var(--blue); margin-right: 15px; width: 30px; text-align: center;}

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 4px; }
  </style>
</head>
<body>

  <div id="top-bar">
    <div class="brand">Wolf of <span>MCA</span></div>
    <div class="bank-container">
      <div class="bank-label">Liquid Capital</div>
      <div id="bank-balance">$0</div>
      <div id="revenue-rate">$0 / sec</div>
    </div>
  </div>

  <div class="col" id="col-left">
    <div class="section-title">The Bullpen (Hires)</div>
    <div id="brokers-list"></div>
  </div>

  <div class="col" id="col-center">
    <button id="dial-btn" onpointerdown="manualClick(event)">
      DIAL
      <span id="click-power-display">+$50 / click</span>
    </button>
  </div>

  <div class="col" id="col-right">
    <div class="section-title">Hustle Upgrades</div>
    <div id="upgrades-list"></div>
  </div>

  <script>
    // --- CORE GAME STATE ---
    let cash = 0;
    let cashPerClick = 50; // Starting commission per manual dial
    let cashPerSec = 0;    // Starting passive income

    // --- BROKERS (Generate passive income) ---
    const brokers = [
      { id: "b1", name: "Junior Opener", desc: "Dials randomly from phonebook.", baseCost: 100, cps: 10, owned: 0 },
      { id: "b2", name: "Aggressive Closer", desc: "Yells at merchants until they sign.", baseCost: 1500, cps: 100, owned: 0 },
      { id: "b3", name: "ISO Manager", desc: "Bribes other brokers for their deals.", baseCost: 12000, cps: 800, owned: 0 },
      { id: "b4", name: "Underwriter", desc: "Approves deals that shouldn't be approved.", baseCost: 50000, cps: 4000, owned: 0 }
    ];

    // --- UPGRADES (Boost click power or global production) ---
    const upgrades = [
      { id: "u1", name: "Red Bull Fridge", desc: "+$50 per manual dial.", cost: 300, owned: false, action: () => { cashPerClick += 50; } },
      { id: "u2", name: "Aged UCC Leads", desc: "Double your manual click power.", cost: 2500, owned: false, action: () => { cashPerClick *= 2; } },
      { id: "u3", name: "Predictive Dialer", desc: "All Junior Openers are 2x faster.", cost: 5000, owned: false, action: () => { brokers[0].cps *= 2; updateCPS(); } },
      { id: "u4", name: "Fake Rolex", desc: "Double manual click power (Flexing works).", cost: 15000, owned: false, action: () => { cashPerClick *= 2; } }
    ];

    // --- DOM ELEMENTS ---
    const elBank = document.getElementById('bank-balance');
    const elRev = document.getElementById('revenue-rate');
    const elClickPower = document.getElementById('click-power-display');
    const elBrokersList = document.getElementById('brokers-list');
    const elUpgradesList = document.getElementById('upgrades-list');
    const elCenterCol = document.getElementById('col-center');

    // --- INITIALIZATION ---
    function init() {
      renderBrokers();
      renderUpgrades();
      
      // The Engine: Runs 10 times a second for smooth number climbing
      setInterval(() => {
        cash += cashPerSec / 10;
        updateUI();
      }, 100);
    }

    // --- ACTIONS ---
    function manualClick(e) {
      cash += cashPerClick;
      spawnFloatingText(e.clientX, e.clientY, `+$${cashPerClick.toLocaleString()}`);
      updateUI();
      
      // Play a tiny vibration on mobile
      if (navigator.vibrate) navigator.vibrate(15);
    }

    function buyBroker(index) {
      let b = brokers[index];
      let cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned)); // Price scales up by 15% each purchase
      
      if (cash >= cost) {
        cash -= cost;
        b.owned++;
        updateCPS();
        renderBrokers();
        updateUI();
      }
    }

    function buyUpgrade(index) {
      let u = upgrades[index];
      if (cash >= u.cost && !u.owned) {
        cash -= u.cost;
        u.owned = true;
        u.action(); // Apply the boost
        renderUpgrades();
        elClickPower.innerText = `+$${cashPerClick.toLocaleString()} / click`;
        updateUI();
      }
    }

    // --- LOGIC UPDATES ---
    function updateCPS() {
      cashPerSec = 0;
      brokers.forEach(b => {
        cashPerSec += (b.owned * b.cps);
      });
      elRev.innerText = `+$${cashPerSec.toLocaleString()} / sec`;
    }

    function updateUI() {
      // Update Bank (no decimals)
      elBank.innerText = "$" + Math.floor(cash).toLocaleString();

      // Check button states for Brokers
      brokers.forEach((b, i) => {
        let cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
        let card = document.getElementById(`broker-card-${i}`);
        if (card) {
          if (cash >= cost) card.classList.remove('disabled');
          else card.classList.add('disabled');
        }
      });

      // Check button states for Upgrades
      upgrades.forEach((u, i) => {
        if (!u.owned) {
          let card = document.getElementById(`upgrade-card-${i}`);
          if (card) {
            if (cash >= u.cost) card.classList.remove('disabled');
            else card.classList.add('disabled');
          }
        }
      });
    }

    // --- RENDERING ---
    function renderBrokers() {
      elBrokersList.innerHTML = '';
      brokers.forEach((b, i) => {
        let cost = Math.floor(b.baseCost * Math.pow(1.15, b.owned));
        elBrokersList.innerHTML += `
          <div class="item-card disabled" id="broker-card-${i}" onclick="buyBroker(${i})">
            <div style="display:flex; align-items:center;">
              <div class="owned-count">${b.owned}</div>
              <div class="item-info">
                <h3>${b.name}</h3>
                <p>+$${b.cps.toLocaleString()}/sec</p>
              </div>
            </div>
            <div class="item-cost">$${cost.toLocaleString()}</div>
          </div>
        `;
      });
    }

    function renderUpgrades() {
      elUpgradesList.innerHTML = '';
      upgrades.forEach((u, i) => {
        if (!u.owned) {
          elUpgradesList.innerHTML += `
            <div class="item-card disabled" id="upgrade-card-${i}" onclick="buyUpgrade(${i})">
              <div class="item-info">
                <h3>${u.name}</h3>
                <p>${u.desc}</p>
              </div>
              <div class="item-cost">$${u.cost.toLocaleString()}</div>
            </div>
          `;
        }
      });
    }

    // --- GAME JUICE (Floating text) ---
    function spawnFloatingText(x, y, text) {
      const el = document.createElement('div');
      el.className = 'float-text';
      el.innerText = text;
      
      // Randomize position slightly around the cursor
      const offsetX = (Math.random() - 0.5) * 60;
      el.style.left = (x + offsetX - 30) + 'px';
      el.style.top = (y - 30) + 'px';
      
      // Make crits green
      el.style.color = 'var(--green)';

      elCenterCol.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    // Start the game
    init();

  </script>
</body>
</html>
