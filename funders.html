<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BrokerOS • Funder Directory</title>

<style>

body{
font-family:Inter,Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:800;
background:linear-gradient(90deg,#22c55e,#38bdf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav a{
margin:0 10px;
color:#94a3b8;
text-decoration:none;
font-weight:600;
}

nav a:hover{
color:white;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

h1{
margin-bottom:10px;
}

.search{
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:8px;
border:none;
background:#020617;
color:white;
border:1px solid #1e293b;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
padding:18px;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:#38bdf8;
}

.logo-box{
height:40px;
margin-bottom:10px;
}

.logo-box img{
max-height:40px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:5px;
}

.tags{
margin:10px 0;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.tag{
font-size:11px;
padding:4px 8px;
border-radius:20px;
background:#0f172a;
border:1px solid #1e293b;
}

.box{
margin-top:8px;
font-size:13px;
color:#cbd5f5;
}

button{
margin-top:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
border:none;
padding:8px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
color:white;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<header>

<div class="logo">BrokerOS</div>

<nav>
<a href="index.html">Home</a>
<a href="marketplace.html">Marketplace</a>
<a href="deal-lab.html">Deal Lab</a>
<a href="funders.html">Funders</a>
<a href="superbroker.html">SuperBroker</a>
</nav>

</header>

<div class="container">

<h1>Funder Directory</h1>
<p style="color:#94a3b8">Search and explore MCA and business funding partners.</p>

<input id="search" class="search" placeholder="Search funders...">

<div id="grid" class="grid"></div>

</div>

<script>

const funders=[

{
name:"Forward Financing",
domain:"forwardfinancing.com",
products:"Working capital advance",
req:"1+ year business • $10k monthly revenue • 500+ credit",
best:"Quick funding for small businesses"
},

{
name:"Credibly",
domain:"credibly.com",
products:"Business loans, MCA",
req:"6+ months business • ~500 credit • $15k deposits",
best:"Newer businesses needing flexible funding"
},

{
name:"Fora Financial",
domain:"forafinancial.com",
products:"Short-term loan, MCA",
req:"~570 credit • 6 months business",
best:"Fast funding with moderate revenue"
},

{
name:"Rapid Finance",
domain:"rapidfinance.com",
products:"Term loan, LOC",
req:"~620 credit • 2 years business",
best:"Established businesses"
},

{
name:"FundKite",
domain:"fundkite.com",
products:"Revenue-based funding",
req:"6 months business • $20k monthly revenue",
best:"Revenue based deals"
},

{
name:"CAN Capital",
domain:"cancapital.com",
products:"Working capital loans",
req:"~600 credit • 3 years business",
best:"Established companies"
},

{
name:"Everest Business Funding",
domain:"everestbf.com",
products:"Working capital advance",
req:"500 credit • $5k revenue",
best:"Quick smaller deals"
},

{
name:"Pearl Capital",
domain:"pearlcapital.com",
products:"MCA",
req:"3 months business",
best:"Early stage businesses"
},

{
name:"OnDeck",
domain:"ondeck.com",
products:"Term loan, LOC",
req:"625 credit • 1 year business",
best:"Established companies"
},

{
name:"Mulligan Funding",
domain:"mulliganfunding.com",
products:"Working capital",
req:"625 credit • $750k annual revenue",
best:"High revenue companies"
},

{
name:"IOU Financial",
domain:"ioufinancial.com",
products:"Term loans",
req:"600 credit • 1 year business",
best:"Short term loans"
},

{
name:"Bitty Advance",
domain:"bittyadvance.com",
products:"Revenue financing",
req:"500 credit • $5k revenue",
best:"Small businesses"
},

{
name:"LCF Group",
domain:"thelcfgroup.com",
products:"LOC, working capital",
req:"Varies",
best:"LOC deals"
},

{
name:"Kalamata Capital Group",
domain:"kalamatacapitalgroup.com",
products:"MCA",
req:"Varies",
best:"Fintech-driven deals"
},

{
name:"Lendini",
domain:"lendini.com",
products:"Revenue financing",
req:"Varies",
best:"Revenue based deals"
},

{
name:"Libertas Funding",
domain:"libertasfunding.com",
products:"Revenue financing",
req:"Varies",
best:"Large funding deals"
}

];

const grid=document.getElementById("grid")

function render(list){

grid.innerHTML=""

list.forEach(f=>{

grid.innerHTML+=`

<div class="card">

<div class="logo-box">
<img src="https://logo.clearbit.com/${f.domain}">
</div>

<div class="title">${f.name}</div>

<div class="tags">
<div class="tag">${f.products}</div>
</div>

<div class="box"><b>Requirements:</b><br>${f.req}</div>

<div class="box"><b>Best for:</b><br>${f.best}</div>

<button onclick="window.open('https://${f.domain}')">
Visit Website
</button>

</div>

`

})

}

render(funders)

document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

let filtered=funders.filter(f=>
f.name.toLowerCase().includes(q)||
f.products.toLowerCase().includes(q)||
f.best.toLowerCase().includes(q)
)

render(filtered)

})

</script>

</body>

</html>
